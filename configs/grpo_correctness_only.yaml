# Baseline 3: GRPO with correctness-only reward (no fairness signal)
# R_total = -P_structural only (lambda=0 removes the fairness term)
# Usage: python -m src.baselines.grpo_no_fairness --seed 42

model_name: "Qwen/Qwen2.5-3B-Instruct"

# Data — full 90/10 split of BBQ (same split as main experiment; seed must match)
train_ratio: 0.9

# Reward — lambda=0 disables fairness reward; alpha=0 disables consistency bonus
lambda_fair: 0.0
alpha_consistency: 0.0

# Training — identical to main experiment (H100 settings)
learning_rate: 1.0e-5
num_train_steps: 3500
group_size: 4
batch_size: 32
gradient_accumulation: 1
kl_coeff: 0.01
clip_ratio_low: 0.20
clip_ratio_high: 0.28

# Quantization — disabled on H100
use_4bit: false
gradient_checkpointing: false

# LoRA
lora_r: 16
lora_alpha: 32

# Output
output_dir: "results/grpo_no_fairness"
save_steps: 500
seed: 42
