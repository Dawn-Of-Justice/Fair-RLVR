# Fair-RLVR: Main experiment config
# Usage: python -m src.train --config configs/fair_rlvr.yaml

model_name: "Qwen/Qwen2.5-3B-Instruct"

# Data — full 90/10 split of BBQ (52,643 train / 5,849 eval)
train_ratio: 0.9

# Reward
lambda_fair: 0.5

# Training
learning_rate: 1.0e-5
num_train_steps: 3500
group_size: 16
batch_size: 8
gradient_accumulation: 2
kl_coeff: 0.01

# LoRA
lora_r: 16
lora_alpha: 32

# Output
output_dir: "results/fair_rlvr"
save_steps: 500
seed: 42
