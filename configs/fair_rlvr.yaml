# Fair-RLVR: Main experiment config
# Target hardware: Lightning.ai single H100 80GB
# Usage: python -m src.train --config configs/fair_rlvr.yaml

model_name: "Qwen/Qwen2.5-3B-Instruct"

# Data — full 90/10 split of BBQ
train_ratio: 0.9

# Reward: R_total = lambda_fair * R_fairness + alpha_consistency * R_consistency - P_structural
lambda_fair: 0.5
alpha_consistency: 0.0  # set to 0.25 to enable counterfactual-consistency bonus

# Training
# Memory budget (H100 80GB, Qwen2.5-3B bf16):
#   model ≈ 6 GB  |  reference model ≈ 6 GB  |  optimizer (LoRA only) ≈ 1 GB
#   forward pass activations (grad-checkpoint): batch*G = 8*4 = 32 seqs × 256 tok ≈ 2 GB
#   generation KV cache: 32 seqs × 256 tok ≈ 0.7 GB
#   total ≈ ~16 GB — leaves ample headroom
learning_rate: 1.0e-5
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
num_train_steps: 3500
group_size: 4
batch_size: 8
gradient_accumulation: 2   # effective batch = 16 prompts → 64 completions per step
max_new_tokens: 256        # BBQ reasoning fits in ~100 tokens; 256 gives headroom
kl_coeff: 0.01

# Quantization — disabled: H100 can hold Qwen2.5-3B in bf16
use_4bit: false
# Gradient checkpointing: recomputes activations during backward; mandatory at these batch sizes
gradient_checkpointing: true

# DAPO asymmetric clipping (arXiv:2503.14476)
clip_ratio_low: 0.20
clip_ratio_high: 0.28

# LoRA
lora_r: 16
lora_alpha: 32

# Output
output_dir: "results/fair_rlvr"
save_steps: 500
seed: 42

# Logging — set use_wandb: true or pass --wandb on the CLI
use_wandb: false
wandb_project: "fair-rlvr"
# wandb_run_name: ""   # uncomment to set a fixed run name
