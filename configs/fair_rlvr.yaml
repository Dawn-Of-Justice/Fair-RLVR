# Fair-RLVR: Main experiment config
# Target hardware: Lightning.ai single H100 80GB
# Usage: python -m src.train --config configs/fair_rlvr.yaml

model_name: "Qwen/Qwen2.5-3B-Instruct"

# Data — full 90/10 split of BBQ
train_ratio: 0.9

# Reward: R_total = lambda_fair * R_fairness + alpha_consistency * R_consistency - P_structural
lambda_fair: 0.5
alpha_consistency: 0.0  # set to 0.25 to enable counterfactual-consistency bonus

# Training
# Memory estimate (gradient_checkpointing=true):
#   batch_size=32, group_size=4 → 128 seqs in forward pass
#   baseline at batch=8,G=4 was 14GB → scaling to 128 seqs ≈ 56GB → fits in 80GB
learning_rate: 1.0e-5
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
num_train_steps: 1000
group_size: 4
batch_size: 176
gradient_accumulation: 1   # effective batch = 32 prompts → 128 completions per step
max_new_tokens: 256
kl_coeff: 0.01

use_4bit: false
gradient_checkpointing: true   # required — stores no activations, recomputes during backward

# DAPO asymmetric clipping (arXiv:2503.14476)
clip_ratio_low: 0.20
clip_ratio_high: 0.28

# LoRA
lora_r: 32
lora_alpha: 32

# Output
output_dir: "results/fair_rlvr"
save_steps: 500
seed: 42

# Logging — set use_wandb: true or pass --wandb on the CLI
use_wandb: false
wandb_project: "fair-rlvr"
