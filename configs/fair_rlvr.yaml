# Fair-RLVR: Main experiment config
# Target hardware: Lightning.ai single H100 80GB (85 GB VRAM)
# Usage: python -m src.train --config configs/fair_rlvr.yaml

model_name: "Qwen/Qwen2.5-3B-Instruct"

# Data — full 90/10 split of BBQ (52,643 train / 5,849 eval)
train_ratio: 0.9

# Reward: R_total = lambda_fair * R_fairness + alpha_consistency * R_consistency - P_structural
lambda_fair: 0.5
# Counterfactual-consistency bonus (Ravulu et al. 2024 CDA, RLVR-adapted).
# 0.0 disables; 0.25 is the recommended on value.
alpha_consistency: 0.0  # set to 0.25 to enable

# Training — tuned for H100 85 GB (Qwen2.5-3B in bf16 ≈ 6 GB; no quantization needed)
learning_rate: 1.0e-5
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
num_train_steps: 3500
group_size: 4        # G=4 gives better advantage estimates than G=2; raise to 8 if entropy collapses
batch_size: 32       # micro-batch; fits comfortably on H100 with bf16 + LoRA
gradient_accumulation: 1
max_new_tokens: 512
kl_coeff: 0.01

# Quantization — disabled: H100 has enough VRAM for Qwen2.5-3B in bf16
use_4bit: false
gradient_checkpointing: false   # not needed on H100; disabling speeds up training ~30%

# DAPO asymmetric clipping (arXiv:2503.14476)
clip_ratio_low: 0.20
clip_ratio_high: 0.28

# LoRA
lora_r: 16
lora_alpha: 32

# Output
output_dir: "results/fair_rlvr"
save_steps: 500
seed: 42

# Logging — set use_wandb: true or pass --wandb on the CLI
use_wandb: false
wandb_project: "fair-rlvr"
# wandb_run_name: ""   # uncomment to set a fixed run name
