# Experiment 2: Lambda ablation sweep
# Run separately for each lambda value:
#   python -m src.train --config configs/lambda_sweep.yaml --lambda-fair 0.1 --output-dir results/lambda_0.1
#   python -m src.train --config configs/lambda_sweep.yaml --lambda-fair 0.3 --output-dir results/lambda_0.3
#   python -m src.train --config configs/lambda_sweep.yaml --lambda-fair 0.5 --output-dir results/lambda_0.5
#   python -m src.train --config configs/lambda_sweep.yaml --lambda-fair 0.7 --output-dir results/lambda_0.7
#   python -m src.train --config configs/lambda_sweep.yaml --lambda-fair 1.0 --output-dir results/lambda_1.0

model_name: "Qwen/Qwen2.5-3B-Instruct"

# Data — full 90/10 split of BBQ (same split as main experiment; seed must match)
train_ratio: 0.9

# Reward — lambda overridden via CLI
lambda_fair: 0.5
# Lambda sweep keeps the consistency bonus OFF so the only varying reward
# component is λ. Set --alpha-consistency on the CLI for combined runs.
alpha_consistency: 0.0

# Training — identical to main experiment for fair comparison
learning_rate: 1.0e-5
num_train_steps: 3500
group_size: 2
batch_size: 8
gradient_accumulation: 2
max_new_tokens: 256
kl_coeff: 0.01

# LoRA
lora_r: 16
lora_alpha: 32

# Output — overridden via CLI per lambda value
output_dir: "results/lambda_sweep"
save_steps: 500
seed: 42
